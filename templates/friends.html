<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友だち一覧 - LINE 一斉配信</title>
    <link rel="stylesheet" href="/static/style.css?v=20260318">
</head>
<body>
    <div class="user-bar">
        <div class="user-bar-inner">
            <span class="user-email">{{ current_user.email }}</span>
            <div class="user-bar-links">
                <a href="/">配信</a>
                <a href="/accounts">アカウント管理</a>
                <a href="/friends" class="active-link">友だち一覧</a>
                {% if current_user.is_admin %}
                <a href="/admin">管理画面</a>
                {% endif %}
                <a href="/chat" id="chatNavLink">チャット</a>
                <a href="/step">ステップ配信</a>
                <a href="/logout">ログアウト</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>友だち一覧</h1>

        <section class="section">
            <div class="friends-toolbar">
                <div class="friends-search">
                    <input type="text" id="friendSearch" placeholder="名前で検索..." oninput="filterFriends()">
                </div>
                <div class="friends-filter">
                    <select id="accountFilter" onchange="filterFriends()">
                        <option value="">全アカウント</option>
                    </select>
                    <select id="statusFilter" onchange="filterFriends()">
                        <option value="">全ステータス</option>
                        <option value="active">有効</option>
                        <option value="blocked">ブロック</option>
                    </select>
                </div>
                <span class="friends-count" id="friendsCount"></span>
            </div>
            <div id="friendsList" class="friends-list">
                <p class="empty-msg">読み込み中...</p>
            </div>
        </section>
    </div>

    <script>
    let allFriends = [];

    document.addEventListener('DOMContentLoaded', loadFriends);

    async function loadFriends() {
        try {
            const resp = await fetch('/api/friends');
            allFriends = await resp.json();
            buildAccountFilter();
            filterFriends();
        } catch (e) {
            document.getElementById('friendsList').innerHTML = '<p class="empty-msg">読み込みに失敗しました</p>';
        }
    }

    function buildAccountFilter() {
        const select = document.getElementById('accountFilter');
        const accounts = [...new Set(allFriends.map(f => f.accountName))];
        accounts.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            select.appendChild(opt);
        });
    }

    function filterFriends() {
        const search = document.getElementById('friendSearch').value.toLowerCase();
        const account = document.getElementById('accountFilter').value;
        const status = document.getElementById('statusFilter').value;

        const filtered = allFriends.filter(f => {
            if (search && !f.displayName.toLowerCase().includes(search)) return false;
            if (account && f.accountName !== account) return false;
            if (status && f.status !== status) return false;
            return true;
        });

        renderFriends(filtered);
    }

    function renderFriends(friends) {
        const list = document.getElementById('friendsList');
        document.getElementById('friendsCount').textContent = friends.length + '人';

        if (friends.length === 0) {
            list.innerHTML = '<p class="empty-msg">友だちがいません</p>';
            return;
        }

        list.innerHTML = friends.map(f => {
            const avatar = f.pictureUrl || defaultAvatar();
            const statusClass = f.status === 'active' ? 'status-active' : 'status-blocked';
            const statusText = f.status === 'active' ? '有効' : 'ブロック';
            const date = formatDate(f.createdAt);

            return `
            <div class="friend-item">
                <img class="friend-avatar" src="${escapeHtml(avatar)}" alt="" onerror="this.src='${defaultAvatar()}'">
                <div class="friend-info">
                    <div class="friend-name">${escapeHtml(f.displayName)}</div>
                    <div class="friend-meta">
                        <span class="friend-account">${escapeHtml(f.accountName)}</span>
                        <span class="friend-status ${statusClass}">${statusText}</span>
                        <span class="friend-msgs">${f.messageCount}通</span>
                    </div>
                </div>
                <div class="friend-date">${date}</div>
            </div>`;
        }).join('');
    }

    function formatDate(str) {
        if (!str) return '';
        try {
            const d = new Date(str.replace(' ', 'T'));
            return d.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });
        } catch { return ''; }
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function defaultAvatar() {
        return 'data:image/svg+xml,' + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40"><circle cx="20" cy="20" r="20" fill="#ccc"/><circle cx="20" cy="16" r="7" fill="#fff"/><ellipse cx="20" cy="32" rx="12" ry="9" fill="#fff"/></svg>'
        );
    }

    // 未読バッジ
    (function(){
        var origTitle = document.title;
        function pollUnread(){
            fetch('/api/chat/unread-count').then(r=>r.json()).then(d=>{
                var link = document.getElementById('chatNavLink');
                if(!link) return;
                var badge = link.querySelector('.nav-badge');
                if(d.count > 0){
                    if(!badge){badge=document.createElement('span');badge.className='nav-badge';link.appendChild(badge);}
                    badge.textContent = d.count > 99 ? '99+' : d.count;
                    document.title = '(' + d.count + ') ' + origTitle;
                } else {
                    if(badge) badge.remove();
                    document.title = origTitle;
                }
            }).catch(function(){});
        }
        pollUnread();
        setInterval(pollUnread, 5000);
    })();
    </script>
</body>
</html>
