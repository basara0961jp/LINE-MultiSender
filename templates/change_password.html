<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード変更 - LINE 一斉配信</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h1>パスワード変更</h1>
                <p>セキュリティのため、初回ログイン時にパスワードを変更してください。</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="login-error" {% if category == 'success' %}style="background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7"{% endif %}>{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="/change-password">
                <div class="login-field">
                    <label for="new_password">新しいパスワード（6文字以上）</label>
                    <input type="password" id="new_password" name="new_password" placeholder="新しいパスワード" required autofocus>
                </div>
                <div class="login-field">
                    <label for="confirm_password">パスワード確認</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="もう一度入力" required>
                </div>
                <button type="submit" class="login-btn">パスワードを変更</button>
            </form>
        </div>
    </div>
</body>
</html>
