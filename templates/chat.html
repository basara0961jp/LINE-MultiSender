<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャット - LINE 一斉配信</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- ユーザーバー -->
    <div class="user-bar">
        <div class="user-bar-inner chat-bar-inner">
            <span class="user-email">{{ current_user.email }}</span>
            <div class="user-bar-links">
                <a href="/">配信</a>
                <a href="/accounts">アカウント管理</a>
                <a href="/friends">友だち一覧</a>
                {% if current_user.is_admin %}
                <a href="/admin">管理画面</a>
                {% endif %}
                <a href="/chat" class="active-link" id="chatNavLink">チャット</a>
                <a href="/step">ステップ配信</a>
                <a href="/logout">ログアウト</a>
            </div>
        </div>
    </div>

    <div class="chat-container">
        <!-- サイドバー: 会話一覧 -->
        <div class="chat-sidebar" id="chatSidebar">
            <div class="chat-sidebar-header">
                <h2>チャット</h2>
            </div>
            <div class="chat-conv-list" id="convList">
                <p class="chat-empty">メッセージはまだありません</p>
            </div>
        </div>

        <!-- メイン: メッセージ表示 -->
        <div class="chat-main" id="chatMain">
            <div class="chat-main-placeholder" id="chatPlaceholder">
                <p>左の会話を選択してください</p>
            </div>
            <div class="chat-main-active hidden" id="chatActive">
                <div class="chat-header" id="chatHeader">
                    <button class="chat-back-btn" id="chatBackBtn" onclick="showSidebar()">&larr;</button>
                    <img class="chat-header-avatar" id="chatHeaderAvatar" src="" alt="">
                    <div class="chat-header-info">
                        <span class="chat-header-name" id="chatHeaderName"></span>
                        <span class="chat-header-bot" id="chatHeaderBot"></span>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-image-preview hidden" id="imagePreview">
                    <img id="imagePreviewImg" src="" alt="">
                    <button class="image-preview-cancel" onclick="cancelImagePreview()">&times;</button>
                </div>
                <div class="chat-input-area">
                    <input type="file" id="chatImageInput" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
                    <button class="chat-attach-btn" onclick="document.getElementById('chatImageInput').click()" title="画像を送信">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                    </button>
                    <textarea id="chatInput" rows="1" placeholder="メッセージを入力..."
                              onkeydown="handleChatKey(event)"></textarea>
                    <button class="chat-send-btn" id="chatSendBtn" onclick="sendChat()">送信</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 画像ライトボックス -->
    <div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
        <img id="lightboxImg" src="" alt="">
    </div>

    <script src="/static/chat.js"></script>
</body>
</html>
