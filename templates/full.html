<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登録受付停止中</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 48px 32px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .icon { font-size: 3rem; margin-bottom: 16px; }
        h1 { font-size: 1.3rem; margin-bottom: 12px; color: #555; }
        p { color: #888; font-size: 0.95rem; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">&#128683;</div>
        <h1>現在登録を受け付けていません</h1>
        <p>すべてのアカウントが定員に達しています。<br>しばらく経ってから再度お試しください。</p>
    </div>
</body>
</html>
