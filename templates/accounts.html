<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント管理 - LINE 一斉配信</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- ユーザーバー -->
    <div class="user-bar">
        <div class="user-bar-inner">
            <span class="user-email">{{ current_user.email }}</span>
            <div class="user-bar-links">
                <a href="/">配信</a>
                <a href="/accounts" class="active-link">アカウント管理</a>
                {% if current_user.is_admin %}
                <a href="/admin">管理画面</a>
                {% endif %}
                <a href="/chat" id="chatNavLink">チャット</a>
                <a href="/logout">ログアウト</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>アカウント管理</h1>

        <!-- アカウント追加 -->
        <section class="section">
            <h2>アカウント追加</h2>
            <div class="add-account">
                <input type="text" id="tokenInput" placeholder="Channel Access Token を貼り付け">
                <button id="addBtn" onclick="addAccount()">追加</button>
            </div>
            <div class="add-account-extra">
                <input type="text" id="secretInput" placeholder="Channel Secret（任意・Webhook署名検証用）">
                <input type="number" id="maxFriendsInput" placeholder="友だち上限（デフォルト500）" min="1" value="500">
            </div>
        </section>

        <!-- アカウント一覧 -->
        <section class="section">
            <h2>登録済みアカウント</h2>
            <div id="accountList" class="account-list">
                <p class="empty-msg">アカウントが登録されていません</p>
            </div>
        </section>

        <!-- Webhook URL一括更新 -->
        <section class="section">
            <h2>Webhook URL 設定</h2>
            <p class="hint">サーバーのパブリックURLを入力して、全アカウントのWebhook URLを一括更新します。<br>2回目以降はLINEからメッセージが来れば自動更新されます。</p>
            <div class="add-account">
                <input type="text" id="publicUrlInput" placeholder="https://xxxxx.up.railway.app">
                <button id="updateWebhookBtn" onclick="updateWebhooks()">一括更新</button>
            </div>
            <div id="webhookResult"></div>
        </section>

        <!-- 登録URL -->
        <section class="section">
            <h2>自動振り分け登録URL</h2>
            <div class="register-url-box">
                <code id="registerUrl"></code>
                <button class="copy-btn" onclick="copyRegisterUrl()" title="コピー">&#128203;</button>
            </div>
            <p class="hint">このURLにアクセスすると、空きのあるアカウントへ自動リダイレクトされます。</p>
            <div id="capacityOverview" class="capacity-overview"></div>
        </section>
    </div>

    <!-- 上限編集モーダル -->
    <div id="editModal" class="modal hidden">
        <div class="modal-content">
            <h3>アカウント設定</h3>
            <input type="hidden" id="editAccountId">
            <label>友だち上限</label>
            <input type="number" id="editMaxFriends" min="1">
            <label>Channel Secret</label>
            <input type="text" id="editChannelSecret" placeholder="未設定">
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeEditModal()">キャンセル</button>
                <button class="modal-save" onclick="saveAccountSettings()">保存</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
    (function(){
        var origTitle = document.title;
        function pollUnread(){
            fetch('/api/chat/unread-count').then(r=>r.json()).then(d=>{
                var link = document.getElementById('chatNavLink');
                if(!link) return;
                var badge = link.querySelector('.nav-badge');
                if(d.count > 0){
                    if(!badge){badge=document.createElement('span');badge.className='nav-badge';link.appendChild(badge);}
                    badge.textContent = d.count > 99 ? '99+' : d.count;
                    document.title = '(' + d.count + ') ' + origTitle;
                } else {
                    if(badge) badge.remove();
                    document.title = origTitle;
                }
            }).catch(function(){});
        }
        pollUnread();
        setInterval(pollUnread, 5000);
    })();
    </script>
</body>
</html>
